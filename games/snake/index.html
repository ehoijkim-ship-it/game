<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뱀 게임</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }
    h1 { font-size: 2rem; margin-bottom: 12px; letter-spacing: 2px; color: #e94560; }
    #score-board {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
      font-size: 1rem;
    }
    #score-board span { color: #a8dadc; font-weight: bold; }
    canvas {
      border: 3px solid #e94560;
      border-radius: 4px;
      background: #0f3460;
    }
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #overlay h2 { font-size: 2rem; color: #e94560; }
    #overlay p { color: #a8dadc; font-size: 1rem; }
    button {
      padding: 10px 32px;
      font-size: 1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #c73652; }
    #controls {
      margin-top: 14px;
      font-size: 0.8rem;
      color: #557;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>🐍 뱀 게임</h1>
  <div id="score-board">
    <div>점수: <span id="score">0</span></div>
    <div>최고 점수: <span id="high-score">0</span></div>
  </div>
  <div style="position:relative">
    <canvas id="game" width="400" height="400"></canvas>
    <div id="overlay">
      <h2 id="overlay-title">뱀 게임</h2>
      <p id="overlay-msg">방향키 또는 WASD로 조종하세요</p>
      <button id="start-btn">시작하기</button>
    </div>
  </div>
  <div id="controls">방향키 / WASD · P: 일시정지</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const CELL = 20;
    const COLS = canvas.width / CELL;
    const ROWS = canvas.height / CELL;

    let snake, dir, nextDir, food, score, highScore, gameLoop, state;
    highScore = 0;

    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMsg = document.getElementById('overlay-msg');
    const startBtn = document.getElementById('start-btn');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('high-score');

    function init() {
      snake = [ { x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 } ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      scoreEl.textContent = 0;
      placeFood();
    }

    function placeFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function step() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { endGame(); return; }
      if (snake.some(s => s.x === head.x && s.y === head.y)) { endGame(); return; }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > highScore) { highScore = score; highScoreEl.textContent = highScore; }
        placeFood();
      } else { snake.pop(); }
      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      for (let x = 0; x < COLS; x++) { for (let y = 0; y < ROWS; y++) { ctx.strokeRect(x * CELL, y * CELL, CELL, CELL); } }
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
      snake.forEach((seg, i) => {
        const ratio = 1 - i / snake.length;
        ctx.fillStyle = `hsl(${140 + i * 2}, 70%, ${35 + ratio * 25}%)`;
        ctx.beginPath();
        ctx.roundRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, 4);
        ctx.fill();
      });
    }

    function startGame() {
      init(); state = 'playing'; overlay.style.display = 'none';
      clearInterval(gameLoop); gameLoop = setInterval(step, 120); draw();
    }

    function endGame() {
      clearInterval(gameLoop); state = 'gameover';
      overlayTitle.textContent = '게임 오버'; overlayMsg.textContent = `점수: ${score}`;
      startBtn.textContent = '다시 시작'; overlay.style.display = 'flex';
    }

    function togglePause() {
      if (state === 'playing') {
        clearInterval(gameLoop); state = 'paused';
        overlayTitle.textContent = '일시정지'; overlayMsg.textContent = 'P를 눌러 계속하기';
        startBtn.textContent = '계속하기'; overlay.style.display = 'flex';
      } else if (state === 'paused') {
        state = 'playing'; overlay.style.display = 'none';
        gameLoop = setInterval(step, 120);
      }
    }

    startBtn.addEventListener('click', startGame);
    document.addEventListener('keydown', e => {
      const map = {
        ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 }, ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 },
        w: { x: 0, y: -1 }, s: { x: 0, y: 1 }, a: { x: -1, y: 0 }, d: { x: 1, y: 0 }
      };
      if (e.key.toLowerCase() === 'p') { if (state === 'playing' || state === 'paused') togglePause(); return; }
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
      const newDir = map[e.key];
      if (!newDir || (newDir.x === -dir.x && newDir.y === -dir.y)) return;
      nextDir = newDir;
    });
    state = 'idle'; draw();
  </script>
</body>
</html>
