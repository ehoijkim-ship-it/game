  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      font-family: 'Segoe UI', sans-serif;

      position: relative;

    canvas {
      border: 3px solid #e94560;

    }

    /* 오버레이 배경 */
    #overlay {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(5, 5, 20, 0.90);
      backdrop-filter: blur(3px);
      border-radius: 2px;
    }
    #overlay.show { display: flex; }

    /* 카드 공통 */

      background: #0d1b3e;
      border-radius: 14px;
      padding: 32px 44px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      border: 2px solid #4fc3f7;
      box-shadow: 0 0 28px rgba(79,195,247,0.30), 0 10px 40px rgba(0,0,0,0.7);
      min-width: 220px;
    }
    /* 상태별 카드 테두리·글로우 */
    #overlay.idle    #overlay-card { border-color: #4fc3f7; box-shadow: 0 0 28px rgba(79,195,247,0.30), 0 10px 40px rgba(0,0,0,0.7); }
    #overlay.gameover #overlay-card { border-color: #e94560; box-shadow: 0 0 28px rgba(233,69,96,0.45), 0 10px 40px rgba(0,0,0,0.7); }
    #overlay.paused  #overlay-card { border-color: #ffd700; box-shadow: 0 0 28px rgba(255,215,0,0.30), 0 10px 40px rgba(0,0,0,0.7); }

    /* 아이콘 */
    #overlay-icon { font-size: 2.4rem; line-height: 1; }

    /* 제목 */

    #overlay.gameover #overlay-title { color: #e94560; }
    #overlay.paused  #overlay-title { color: #ffd700; }

    /* 서브 메시지 */

    /* 게임오버 점수 강조 */

    /* 버튼 */

      color: #fff;
      margin-top: 4px;
      transition: filter 0.15s, transform 0.1s;
    }
    #start-btn:active { transform: scale(0.97); }
    #overlay.idle    #start-btn { background: #1a7bb9; }
    #overlay.idle    #start-btn:hover { filter: brightness(1.2); }
    #overlay.gameover #start-btn { background: #c0283f; }
    #overlay.gameover #start-btn:hover { filter: brightness(1.2); }
    #overlay.paused  #start-btn { background: #b8960a; }
    #overlay.paused  #start-btn:hover { filter: brightness(1.2); }

    /* 캔버스 바로 아래 조작 안내 */

<body>
  <h1>🐍 뱀 게임</h1>
  <div id="score-board">
    <div>점수: <span id="score">0</span></div>
    <div>최고 점수: <span id="high-score">0</span></div>
  </div>
  <div id="game-wrap">
    <canvas id="game" width="400" height="400"></canvas>
    <div id="overlay" class="show idle">
      <div id="overlay-card">
        <div id="overlay-icon">🐍</div>
        <h2 id="overlay-title">뱀 게임</h2>
        <p id="overlay-msg">방향키 / WASD 로 조종하세요<br>마우스 클릭 또는 터치 스와이프 가능</p>
        <div id="overlay-score" class="hidden"></div>
        <button id="start-btn">시작하기</button>
      </div>
    </div>
  </div>
  <div id="controls">키보드: 방향키 / WASD &nbsp;·&nbsp; P: 일시정지 &nbsp;·&nbsp; 마우스 클릭 / 터치 스와이프로 방향 전환</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const CELL = 20;
    const COLS = canvas.width / CELL;
    const ROWS = canvas.height / CELL;

    let snake, dir, nextDir, food, score, highScore = 0, gameLoop, state = 'idle';

    const overlay      = document.getElementById('overlay');
    const overlayIcon  = document.getElementById('overlay-icon');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMsg   = document.getElementById('overlay-msg');
    const overlayScore = document.getElementById('overlay-score');
    const startBtn     = document.getElementById('start-btn');
    const scoreEl      = document.getElementById('score');
    const highScoreEl  = document.getElementById('high-score');
    const gameWrap     = document.getElementById('game-wrap');

    // ── 초기화 ──────────────────────────────────────────────
    function init() {
      snake   = [ { x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 } ];
      dir     = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score   = 0;
      scoreEl.textContent = 0;
      placeFood();
    }

    function placeFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    // ── 게임 루프 ────────────────────────────────────────────
    function step() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { endGame(); return; }
      if (snake.some(s => s.x === head.x && s.y === head.y))             { endGame(); return; }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > highScore) { highScore = score; highScoreEl.textContent = highScore; }
        placeFood();
      } else { snake.pop(); }
      draw();
    }

    // ── 렌더링 ──────────────────────────────────────────────
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // 격자
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      for (let x = 0; x < COLS; x++)
        for (let y = 0; y < ROWS; y++)
          ctx.strokeRect(x * CELL, y * CELL, CELL, CELL);
      if (!food || !snake) return;
      // 먹이
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
      // 뱀
      snake.forEach((seg, i) => {
        const ratio = 1 - i / snake.length;
        ctx.fillStyle = `hsl(${140 + i * 2}, 70%, ${35 + ratio * 25}%)`;
        ctx.beginPath();
        ctx.roundRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, 4);
        ctx.fill();
      });
    }

    // ── 오버레이 표시 ────────────────────────────────────────
    const STATE_META = {
      idle:     { cls: 'idle',     icon: '🐍', title: '뱀 게임',   msg: '방향키 / WASD 로 조종하세요\n마우스 클릭 또는 터치 스와이프 가능', btn: '시작하기',  showScore: false },
      gameover: { cls: 'gameover', icon: '💀', title: '게임 오버', msg: '다시 도전해보세요!',                                              btn: '다시 시작', showScore: true  },
      paused:   { cls: 'paused',   icon: '⏸',  title: '일시정지', msg: 'P 를 눌러 계속하기',                                              btn: '계속하기',  showScore: false },
    };

    function showOverlay(type) {
      const m = STATE_META[type];
      overlay.className = 'show ' + m.cls;
      overlayIcon.textContent  = m.icon;
      overlayTitle.textContent = m.title;
      overlayMsg.innerHTML     = m.msg.replace('\n', '<br>');
      startBtn.textContent     = m.btn;
      if (m.showScore) {
        overlayScore.textContent = `점수  ${score}`;
        overlayScore.classList.remove('hidden');
      } else {
        overlayScore.classList.add('hidden');
      }
    }

    function hideOverlay() {
      overlay.classList.remove('show');
    }

    // ── 상태 전환 ────────────────────────────────────────────
    function startGame() {
      init();
      state = 'playing';
      hideOverlay();
      clearInterval(gameLoop);
      gameLoop = setInterval(step, 120);
      draw();
    }

    function endGame() {
      clearInterval(gameLoop);
      state = 'gameover';
      showOverlay('gameover');
    }

    function togglePause() {
      if (state === 'playing') {
        clearInterval(gameLoop);
        state = 'paused';
        showOverlay('paused');
      } else if (state === 'paused') {
        state = 'playing';
        hideOverlay();
        gameLoop = setInterval(step, 120);
      }
    }

    // ── 방향 적용 ─────────────────────────────────────────────
    function applyDir(nd) {
      if (!nd || (nd.x === -dir.x && nd.y === -dir.y)) return;
      nextDir = nd;
    }

    // 마우스/터치 클릭: 방향 즉시 반영 (interval 리셋으로 빠른 반응)
    function applyDirImmediate(nd) {
      if (!nd || (nd.x === -dir.x && nd.y === -dir.y)) return;
      nextDir = nd;
      clearInterval(gameLoop);
      step();
      if (state === 'playing') {
        gameLoop = setInterval(step, 120);
      }
    }

    // ── 키보드 ──────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      const map = {
        ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1}, ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0},
        w: {x:0,y:-1}, s: {x:0,y:1}, a: {x:-1,y:0}, d: {x:1,y:0},
        W: {x:0,y:-1}, S: {x:0,y:1}, A: {x:-1,y:0}, D: {x:1,y:0}
      };
      if (e.key.toLowerCase() === 'p') { if (state === 'playing' || state === 'paused') togglePause(); return; }
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
      if (state === 'idle' || state === 'gameover') { startGame(); return; }
      const nd = map[e.key];
      if (nd) applyDir(nd);
    });

    startBtn.addEventListener('click', startGame);

    // ── 마우스 클릭 (즉시 반응) ──────────────────────────────
    gameWrap.addEventListener('click', e => {
      if (e.target === startBtn) return;
      if (state === 'idle' || state === 'gameover') { startGame(); return; }
      if (state !== 'playing') return;
      const rect  = canvas.getBoundingClientRect();
      const scaleX = canvas.width  / rect.width;
      const scaleY = canvas.height / rect.height;
      const cx = (e.clientX - rect.left) * scaleX;
      const cy = (e.clientY - rect.top)  * scaleY;
      const hx = snake[0].x * CELL + CELL / 2;
      const hy = snake[0].y * CELL + CELL / 2;
      const dx = cx - hx, dy = cy - hy;
      if (dx === 0 && dy === 0) return;
      applyDirImmediate(Math.abs(dx) > Math.abs(dy)
        ? (dx > 0 ? {x:1,y:0} : {x:-1,y:0})
        : (dy > 0 ? {x:0,y:1} : {x:0,y:-1}));
    });

    // ── 터치 스와이프 ────────────────────────────────────────
    let tsX = 0, tsY = 0;
    gameWrap.addEventListener('touchstart', e => {
      tsX = e.touches[0].clientX;
      tsY = e.touches[0].clientY;
      e.preventDefault();
      if (state === 'idle' || state === 'gameover') startGame();
    }, { passive: false });

    gameWrap.addEventListener('touchend', e => {
      if (state !== 'playing') return;
      const dx = e.changedTouches[0].clientX - tsX;
      const dy = e.changedTouches[0].clientY - tsY;
      if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
      applyDirImmediate(Math.abs(dx) > Math.abs(dy)
        ? (dx > 0 ? {x:1,y:0} : {x:-1,y:0})
        : (dy > 0 ? {x:0,y:1} : {x:0,y:-1}));
    }, { passive: false });

    // ── 초기 렌더 ────────────────────────────────────────────
    showOverlay('idle');
    draw();
  </script>
</body>
