<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>백수의 방 - 방치형 게임 | 무료게임 놀이터</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--accent:#fbbf24;--green:#86efac;--purple:#a78bfa;--red:#f87171;--bg:#0a0a0a;--panel:#111;--border:#222;}
body{font-family:'Press Start 2P',monospace;background:var(--bg);color:#e2e8f0;height:100dvh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}

/* TOP BAR - Compact but Big Money */
#top{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;background:var(--panel);border-bottom:2px solid var(--border);flex-shrink:0;gap:10px;}
#money-wrap{min-width:0;flex:1;}
#money{font-size:28px;color:var(--accent);white-space:nowrap;margin-bottom:4px;text-shadow: 3px 3px 0 #000;}
#ps{font-size:16px;color:var(--green);font-weight:bold;}
#room-hud{text-align:right;flex-shrink:0;}
#room-hud-name{font-size:12px;color:var(--purple);margin-bottom:4px;}
#room-hud-slots{font-size:11px;color:var(--green);}

/* ROOM */
#room{flex:1;position:relative;overflow:hidden;}
#room::before{content:'';position:absolute;top:0;left:0;bottom:0;width:14%;background:linear-gradient(90deg,rgba(0,0,0,0.45),transparent);z-index:4;pointer-events:none;}
#room::after{content:'';position:absolute;top:0;right:0;bottom:0;width:14%;background:linear-gradient(270deg,rgba(0,0,0,0.45),transparent);z-index:4;pointer-events:none;}
#room-ceiling{position:absolute;top:0;left:0;right:0;height:8px;z-index:5;transition:background 0.8s;}
#room-wall{position:absolute;top:0;left:0;right:0;bottom:36%;transition:background 0.8s;}
#room-baseboard{position:absolute;bottom:36%;left:0;right:0;height:6px;z-index:5;transition:background 0.8s;}
#room-floor{position:absolute;bottom:0;left:0;right:0;height:36%;transition:background 0.8s;}
#room-window{position:absolute;top:8%;right:20%;width:70px;height:54px;border:5px solid rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:26px;border-radius:3px;z-index:6;transition:all 0.5s;box-shadow:inset 0 0 18px rgba(255,255,255,0.12),0 3px 8px rgba(0,0,0,0.5);}
#char{position:absolute;bottom:36%;left:50%;transform:translate(-50%,52%);font-size:54px;z-index:5;animation:breathe 4s ease-in-out infinite;cursor:pointer;}
@keyframes breathe{0%,100%{transform:translate(-50%,52%) scale(1);}50%{transform:translate(-50%,52%) scale(1.07);}}
#obj-grid{position:absolute;inset:0;z-index:3;pointer-events:none;}
.obj-slot{position:absolute;display:flex;align-items:center;justify-content:center;filter:drop-shadow(2px 5px 4px rgba(0,0,0,0.75));transition:transform 0.2s;}
.obj-lv{position:absolute;top:-7px;right:-7px;background:var(--accent);color:#000;font-size:10px;padding:2px 4px;border-radius:3px;font-weight:bold;z-index:1;}
.income-pop{position:absolute;font-size:16px;color:var(--green);pointer-events:none;animation:floatup 1.5s ease-out forwards;z-index:20;white-space:nowrap;font-weight:bold;text-shadow:2px 2px 0 #000;}
@keyframes floatup{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-60px);}}

/* PANEL - More space for content */
#panel{height:55vh;max-height:650px;background:var(--panel);border-top:4px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
#tabs{display:flex;border-bottom:3px solid var(--border);flex-shrink:0;}
.tb{flex:1;padding:6px 2px;font-family:'Press Start 2P',monospace;font-size:13px;background:#111;color:#555;border:none;cursor:pointer;border-right:1px solid var(--border);transition:all 0.15s;}
.tb:last-child{border-right:none;}
.tb.on{background:#222;color:var(--accent);border-bottom:4px solid var(--accent);}
#tab-body{flex:1;overflow-y:auto;padding:15px;scrollbar-width:thin;scrollbar-color:#444 transparent;}
#tab-body::-webkit-scrollbar{width:8px;}
#tab-body::-webkit-scrollbar-thumb{background:#444;border-radius:4px;}

/* GRID WRAPPER */
.grid-container{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;}

/* SHOP ITEMS - MEGA TEXT */
.si{display:flex;flex-direction:column;padding:25px;background:#1a1a1a;border:4px solid #333;border-radius:15px;transition:all 0.15s;position:relative;min-height:340px;}
.si:hover{border-color:var(--accent);background:#222;}
.si.locked{opacity:0.2;filter:grayscale(1);}
.si.poor{border-color:#552222;}
.si-header{display:flex;flex-direction:column;align-items:center;gap:15px;margin-bottom:15px;text-align:center;}
.si-ico{font-size:48px;flex-shrink:0;}
.si-name{font-size:18px;color:#fff;line-height:1.4;font-weight:bold;text-shadow: 2px 2px 0 #000;}
.si-desc{font-size:12px;color:#777;line-height:2;margin-bottom:20px;height:72px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;text-align:center;}
.si-footer{margin-top:auto;}
.si-meta{margin-bottom:20px;text-align:center;border-top: 2px solid #2a2a2a;padding-top:15px;}
.si-meta .c{display:block;font-size:24px;color:var(--accent);margin-bottom:10px;font-weight:bold;text-shadow: 2px 2px 0 #000;}
.si-meta .i{display:block;font-size:15px;color:var(--green);font-weight:bold;}
.buy-btn{width:100%;background:#2563eb;color:#fff;border:none;font-family:'Press Start 2P',monospace;font-size:18px;padding:20px;cursor:pointer;border-radius:10px;transition:all 0.15s;box-shadow: 0 6px 0 #1d4ed8;font-weight:bold;}
.buy-btn:hover:not(:disabled){background:#3b82f6;transform:translateY(-2px);box-shadow: 0 8px 0 #1d4ed8;}
.buy-btn:active:not(:disabled){transform:translateY(4px);box-shadow: 0 2px 0 #1d4ed8;}
.buy-btn:disabled{background:#333;color:#666;cursor:not-allowed;box-shadow:none;}

/* UPGRADE ITEMS - MEGA TEXT */
.ui{display:flex;flex-direction:column;padding:25px;background:#1a1a1a;border:4px solid #333;border-radius:15px;transition:all 0.15s;min-height:280px;}
.ui-header{display:flex;flex-direction:column;align-items:center;gap:15px;margin-bottom:15px;text-align:center;}
.ui-info{width:100%;}
.ui-name{font-size:18px;color:#fff;margin-bottom:10px;font-weight:bold;text-shadow: 2px 2px 0 #000;}
.ui-lv{font-size:14px;color:var(--purple);margin-bottom:8px;font-weight:bold;}
.ui-next{font-size:13px;color:var(--green);line-height:1.8;background: rgba(0,0,0,0.4);padding:12px;border-radius:8px;margin-bottom:15px;}
.up-btn{width:100%;background:#7c3aed;color:#fff;border:none;font-family:'Press Start 2P',monospace;font-size:18px;padding:20px;cursor:pointer;border-radius:10px;margin-top:auto;transition:all 0.15s;box-shadow: 0 6px 0 #6d28d9;font-weight:bold;}
.up-btn:hover:not(:disabled){background:#8b5cf6;}
.up-btn:disabled{background:#333;color:#666;cursor:not-allowed;box-shadow:none;}

/* ROOM TAB */
.rc{background:#1a1a1a;border:4px solid #333;border-radius:15px;padding:40px 20px;text-align:center;margin-bottom:25px;}
.rc h3{font-size:22px;color:var(--accent);margin-bottom:20px;text-shadow: 2px 2px 0 #000;}
.rc .ri{font-size:16px;color:var(--purple);margin-bottom:12px;font-weight:bold;}
.rc .rdesc{font-size:14px;color:#94a3b8;line-height:2.2;margin:25px 0;}
.rub{width:100%;background:#10b981;color:#fff;border:none;font-family:'Press Start 2P',monospace;font-size:20px;padding:25px;cursor:pointer;border-radius:15px;transition:all 0.15s;box-shadow: 0 8px 0 #059669;font-weight:bold;}
.rub:hover:not(:disabled){background:#34d399;transform:translateY(-2px);box-shadow: 0 10px 0 #059669;}
.rub:active:not(:disabled){transform:translateY(4px);box-shadow: 0 2px 0 #059669;}
.rub:disabled{background:#333;color:#666;cursor:not-allowed;box-shadow:none;}

/* MODAL - BIGGER */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:100;align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:var(--panel);border:5px solid var(--accent);border-radius:20px;padding:40px;max-width:400px;width:90%;text-align:center;animation:popin 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
@keyframes popin{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal .m-ico{font-size:80px;margin-bottom:25px;}
.modal h3{font-size:20px;color:var(--accent);margin-bottom:20px;}
.modal p{font-size:14px;color:#cbd5e1;line-height:2.2;margin-bottom:20px;}
.modal .m-fx{font-size:16px;color:var(--green);margin-bottom:30px;min-height:35px;font-weight:bold;}
.modal-btn{width:100%;background:var(--accent);color:#000;border:none;font-family:'Press Start 2P',monospace;font-size:16px;padding:20px;cursor:pointer;border-radius:12px;font-weight:bold;}
.modal.purple{border-color:var(--purple);}
.modal.purple .m-fx{color:var(--purple);}
.modal.purple .modal-btn{background:var(--purple);color:#fff;}

/* TOAST */
#toast{position:fixed;bottom:calc(55vh + 20px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.95);border:3px solid var(--accent);color:var(--accent);font-size:14px;padding:15px 25px;border-radius:10px;z-index:200;opacity:0;transition:opacity 0.2s;white-space:nowrap;pointer-events:none;box-shadow:0 6px 25px rgba(0,0,0,0.6);font-weight:bold;}
#toast.show{opacity:1;}

/* BUFF indicator */
#buff-bar{display:none;position:absolute;top:15px;left:20px;font-size:14px;color:var(--accent);background:rgba(0,0,0,0.8);padding:10px 20px;border-radius:8px;z-index:10;border:2px solid var(--accent);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.7;}}
#buff-bar.show{display:block;}

/* CLICK */
#char{cursor:pointer;}
#char.tapped{animation:char-tap 0.18s ease-out forwards;}
@keyframes char-tap{0%{transform:translate(-50%,-50%) scale(1.45);}100%{transform:translate(-50%,-50%) scale(1);}}
.click-pop{position:absolute;font-size:22px;color:var(--accent);pointer-events:none;animation:clickfloat 0.9s ease-out forwards;z-index:25;white-space:nowrap;font-weight:bold;text-shadow:2px 2px 0 #000;}
@keyframes clickfloat{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.3);}100%{opacity:0;transform:translateX(-50%) translateY(-85px) scale(0.9);}}
.click-hint{position:absolute;bottom:33%;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(251,191,36,0.55);pointer-events:none;animation:pulse 2s infinite;z-index:6;white-space:nowrap;}
</style>
</head>
<body>

<div id="top">
  <div id="money-wrap">
    <div id="money">💰 ₩0</div>
    <div id="ps">📈 +₩0/s</div>
  </div>
  <div id="room-hud">
    <div id="room-hud-name">🏚️ 고시원</div>
    <div id="room-hud-slots">슬롯 0/3</div>
  </div>
</div>

<div id="room">
  <div id="room-ceiling"></div>
  <div id="room-wall"></div>
  <div id="room-baseboard"></div>
  <div id="room-floor"></div>
  <div id="room-window">🧱</div>
  <div id="buff-bar">✨ 버프 중!</div>

  <div id="obj-grid"></div>
</div>

<div id="panel">
  <div id="tabs">
    <button class="tb on" onclick="switchTab('shop')">🛒 상점</button>

    <button class="tb" onclick="switchTab('room')">🏠 방</button>
  </div>
  <div id="tab-body"></div>
</div>

<div class="modal-bg" id="ev-modal">
  <div class="modal">
    <div class="m-ico" id="ev-ico">🐦</div>
    <h3 id="ev-title"></h3>
    <p id="ev-desc"></p>
    <div class="m-fx" id="ev-fx"></div>
    <button class="modal-btn" onclick="closeEvent()">확인</button>
  </div>
</div>

<div class="modal-bg" id="lu-modal">
  <div class="modal purple">
    <div class="m-ico" id="lu-ico">🏠</div>
    <h3>🎉 방 업그레이드!</h3>
    <p id="lu-name" style="color:var(--accent);font-size:8px;"></p>
    <div class="m-fx" id="lu-desc"></div>
    <button class="modal-btn" onclick="document.getElementById('lu-modal').classList.remove('show')">입주하기</button>
  </div>
</div>

<div id="toast"></div>

let G={money:0,totalEarned:0,stage:0,objs:{},lastSave:Date.now(),buff:null,clickLv:0,totalClicks:0};

// ═══════════════════════════════
// FORMAT
// ═══════════════════════════════
function fmt(n){
  n=Math.floor(n);
  if(n<0)return'-'+fmt(-n);
  // stage 9 easter egg
  if(G.stage>=9&&n>1e15){
    const msgs=['∞','???','모름','많음','엄청','우주적','차원초과','그냥 많음'];
    return msgs[Math.floor(Date.now()/2000)%msgs.length];
  }
  if(n<1e3)return n.toLocaleString();
  if(n<1e6)return(n/1e3).toFixed(1).replace(/\.0$/,'')+'K';
  if(n<1e9)return(n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';
  if(n<1e12)return(n/1e9).toFixed(2).replace(/\.?0+$/,'')+'B';
  if(n<1e15)return(n/1e12).toFixed(2).replace(/\.?0+$/,'')+'T';
  return(n/1e15).toFixed(2).replace(/\.?0+$/,'')+'Q';
}
function fmtPs(n){return n<1000?n.toFixed(1):fmt(n);}

// ═══════════════════════════════
// CORE CALC
// ═══════════════════════════════
function calcPs(){
  let t=0;
  for(const[id,o] of Object.entries(G.objs)){
    const def=OBJS.find(x=>x.id===id);
    if(!def)continue;
    t+=def.ps*def.lvmult[o.lv]*o.cnt;
  }
  if(G.buff&&Date.now()<G.buff.end)t*=G.buff.mult;
  return t;
}
function usedSlots(){return Object.values(G.objs).reduce((s,o)=>s+o.cnt,0);}
function availSlots(){const r=ROOMS[G.stage];return r.slots===Infinity?999999:r.slots-usedSlots();}

// ═══════════════════════════════
// SAVE / LOAD
// ═══════════════════════════════
function save(){G.lastSave=Date.now();localStorage.setItem('idle_room_v2',JSON.stringify(G));}
function load(){
  try{
    const raw=localStorage.getItem('idle_room_v2');
    if(!raw)return;
    const s=JSON.parse(raw);
    G={...G,...s};
    const elapsed=(Date.now()-G.lastSave)/1000;
    if(elapsed>5&&elapsed<604800){
      const offPs=calcPs();
      const earned=offPs*elapsed*1.0;
      if(earned>1){
        G.money+=earned;G.totalEarned+=earned;
        setTimeout(()=>showEvent({e:'😴',t:'오프라인 수익!',
          d:`방치해 두셨군요.\n그 동안에도 돈은 착착 쌓였습니다.`,
          fx:`+₩${fmt(earned)} 오프라인 수익!\n(${Math.floor(elapsed/3600)}시간 ${Math.floor((elapsed%3600)/60)}분)`}),600);
      }
    }
    G.lastSave=Date.now();
  }catch(e){console.warn('load err',e);}
}

// ═══════════════════════════════
// GAME LOOP
// ═══════════════════════════════
let lastTick=Date.now(),saveTmr=0,evTmr=0,evNext=30+Math.random()*30,popTmr=0,tabTmr=0;
function tick(){
  const now=Date.now(),dt=(now-lastTick)/1000;lastTick=now;
  if(G.buff&&now>G.buff.end)G.buff=null;
  ps=calcPs();
  G.money+=ps*dt;G.totalEarned+=ps*dt;
  updateHUD();
  saveTmr+=dt;if(saveTmr>=5){save();saveTmr=0;}
  evTmr+=dt;if(evTmr>=evNext&&!document.getElementById('ev-modal').classList.contains('show')){triggerEvent();evTmr=0;evNext=45+Math.random()*45;}
  popTmr+=dt;if(popTmr>=2&&ps>0){spawnIncomePop();popTmr=0;}
  tabTmr+=dt;if(tabTmr>=1.5){tabTmr=0;renderTab();}
  // buff bar
  const bb=document.getElementById('buff-bar');
  if(G.buff&&Date.now()<G.buff.end){bb.classList.add('show');bb.textContent=`✨ ×${G.buff.mult} 버프 중!`;}
  else bb.classList.remove('show');
}
function updateHUD(){
  document.getElementById('money').textContent='💰 ₩'+fmt(G.money);
  document.getElementById('ps').textContent='📈 +₩'+fmtPs(ps)+'/s';
  const r=ROOMS[G.stage],used=usedSlots(),total=r.slots;
  document.getElementById('room-hud-name').textContent=r.emoji+' '+r.name;
  document.getElementById('room-hud-slots').textContent='슬롯 '+used+'/'+(total===Infinity?'∞':total);
  renderObjGrid();
}
function renderObjGrid(){
  const grid=document.getElementById('obj-grid');
  grid.innerHTML='';
  const items=[];
  for(const[id,o] of Object.entries(G.objs)){
    const def=OBJS.find(x=>x.id===id);
    if(!def)continue;
    for(let i=0;i<o.cnt;i++)items.push({e:def.e,lv:o.lv});
  }
  items.forEach((item,i)=>{
    if(i>=SLOT_POSITIONS.length)return;
    const pos=SLOT_POSITIONS[i];
    const sl=document.createElement('div');
    sl.className='obj-slot';
    sl.style.cssText=`left:${pos.x}%;top:${pos.y}%;font-size:${pos.sz}px;`;
    sl.textContent=item.e;
    if(item.lv>0){
      const b=document.createElement('div');
      b.className='obj-lv';
      b.textContent='+'+item.lv;
      sl.appendChild(b);
    }
    grid.appendChild(sl);
  });
}
function spawnIncomePop(){
  const room=document.getElementById('room');
  const p=document.createElement('div');
  p.className='income-pop';p.textContent='+₩'+fmt(ps*2);
  p.style.left=(15+Math.random()*65)+'%';p.style.top=(25+Math.random()*45)+'%';
  room.appendChild(p);setTimeout(()=>p.remove(),1500);
}

// ═══════════════════════════════
// ROOM VISUAL
// ═══════════════════════════════
function updateRoomVisual(){
  const r=ROOMS[G.stage];
  const css=ROOM_CSS[G.stage]||ROOM_CSS[0];
  document.getElementById('room-wall').style.background=css.wall;
  document.getElementById('room-floor').style.background=css.floor;
  document.getElementById('room-baseboard').style.background=css.base;
  document.getElementById('room-ceiling').style.background=css.ceil;
  // 창문 스타일
  const win=document.getElementById('room-window');
  win.textContent=r.win;win.title=r.winLabel;
  // 창문 테두리를 방 분위기에 맞게
  win.style.borderColor=css.base||'#444';
  document.getElementById('char').textContent=r.char;
  const wall=document.getElementById('room-wall');
  if(G.stage>=8){wall.classList.add('stage9-bg');}else{wall.classList.remove('stage9-bg');}
  let sc=document.getElementById('star-cv');
  if(G.stage>=8){
    if(!sc){sc=document.createElement('canvas');sc.id='star-cv';sc.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:1;';wall.appendChild(sc);}
    drawStars(sc);
  }else if(sc)sc.remove();
}
function drawStars(cv){
  const w=cv.parentElement.offsetWidth||300,h=cv.parentElement.offsetHeight||200;
  cv.width=w;cv.height=h;
  const ctx=cv.getContext('2d');ctx.clearRect(0,0,w,h);
  for(let i=0;i<100;i++){
    const x=Math.random()*w,y=Math.random()*h,r=Math.random()*1.5;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${0.3+Math.random()*0.7})`;ctx.fill();
  }
}

// ═══════════════════════════════
// TABS
// ═══════════════════════════════
function switchTab(t){
  activeTab=t;
  document.querySelectorAll('.tb').forEach((b,i)=>{b.classList.toggle('on',['shop','upgrade','room'][i]===t);});
  renderTab();
}
function renderTab(){
  const c=document.getElementById('tab-body');
  if(activeTab==='shop')renderShop(c);
  else if(activeTab==='upgrade')renderUpgrade(c);
  else renderRoomTab(c);
}
function renderShop(c){
  const scrollTop=c.scrollTop;
  c.innerHTML='';
  const avail=availSlots();
  if(avail<=0){
    const n=document.createElement('div');
    n.style.cssText='text-align:center;padding:12px;font-size:10px;color:var(--red);margin-bottom:10px;font-weight:bold;';
    n.textContent='⚠️ 슬롯 가득 참! 방을 업그레이드하세요.';c.appendChild(n);
  }
  
  const grid = document.createElement('div');
  grid.className = 'grid-container';
  
  for(const obj of OBJS){
    const o=G.objs[obj.id]||{cnt:0,lv:0};
    const unlocked=G.stage>=obj.stage;
    const canBuy=G.money>=obj.cost&&avail>0&&unlocked;
    const el=document.createElement('div');
    el.className='si'+((!unlocked)?' locked':(!canBuy?' poor':''));
    const curIncome=obj.ps*obj.lvmult[o.lv];
    
    el.innerHTML=`
      <div class="si-header">
        <div class="si-ico">${obj.e}</div>
        <div class="si-name">${obj.lvnames[o.lv]}${o.cnt>0?`<br><span style="color:var(--purple);font-size:9px;">[보유: ${o.cnt}]</span>`:''}</div>
      </div>
      <div class="si-desc">${!unlocked?`🔒 ${ROOMS[obj.stage].name} 해금 필요`:obj.desc}</div>
      <div class="si-footer">
        <div class="si-meta">
          <span class="c">₩${fmt(obj.cost)}</span>
          <span class="i">+₩${fmtPs(curIncome)}/s</span>
        </div>
        <button class="buy-btn" onclick="buyObj('${obj.id}')" ${(!canBuy||!unlocked)?'disabled':''}>구매</button>
      </div>`;
    grid.appendChild(el);
  }
  c.appendChild(grid);
  c.scrollTop=scrollTop;
}

function renderUpgrade(c){
  const scrollTop=c.scrollTop;
  c.innerHTML='';

  // 클릭력 업그레이드 카드
  const maxClickLv=CLICK_COSTS.length-1;
  const nextClickLv=G.clickLv+1;
  const hasNextClick=nextClickLv<=maxClickLv;
  const nextClickCost=hasNextClick?CLICK_COSTS[nextClickLv]:0;
  const canUpClick=hasNextClick&&G.money>=nextClickCost;
  const clickBar='█'.repeat(G.clickLv+1)+'░'.repeat(maxClickLv-G.clickLv);
  const clickCard=document.createElement('div');
  clickCard.className='ui';
  clickCard.style.cssText='border-color:var(--accent);margin-bottom:15px;';
  clickCard.innerHTML=`
    <div class="ui-header">
      <div style="font-size:32px;">👆</div>
      <div class="ui-info">
        <div class="ui-name">클릭력</div>
        <div class="ui-lv">LV${G.clickLv+1} [${clickBar}]</div>
      </div>
    </div>
    <div class="ui-next">
      현재: ${CLICK_NAMES[G.clickLv]} (×${CLICK_MULTS[G.clickLv]}배)<br>
      1클릭 = ₩${fmt(calcClickVal())}<br>
      ${hasNextClick?`▶ 다음: ${CLICK_NAMES[nextClickLv]} (×${CLICK_MULTS[nextClickLv]}배)`:`<span style="color:var(--accent)">✨ 최대 클릭력 달성!</span>`}
    </div>
    <button class="up-btn" onclick="upClick()" ${(!canUpClick||!hasNextClick)?'disabled':''} style="background:#d97706;box-shadow:0 6px 0 #92400e;">
      ${hasNextClick?'₩'+fmt(nextClickCost):'MAX'}
    </button>`;
  c.appendChild(clickCard);

  const owned=Object.entries(G.objs).filter(([,o])=>o.cnt>0);
  if(!owned.length){
    const empty=document.createElement('div');
    empty.style.cssText='text-align:center;padding:40px;font-size:11px;color:#555;line-height:2;';
    empty.textContent='아직 구매한 물건이 없습니다. 상점에서 물건을 먼저 구매하세요!';
    c.appendChild(empty);
    c.scrollTop=scrollTop;
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'grid-container';
  
  for(const[id,o] of owned){
    const def=OBJS.find(x=>x.id===id);if(!def)continue;
    const lv=o.lv,maxLv=def.lvnames.length-1,nextLv=lv+1;
    const hasNext=nextLv<=maxLv,upCost=hasNext?def.lvcosts[nextLv]:0;
    const canUp=hasNext&&G.money>=upCost;
    const bar='█'.repeat(lv+1)+'░'.repeat(maxLv-lv);
    
    const el=document.createElement('div');
    el.className='ui';
    el.innerHTML=`
      <div class="ui-header">
        <div style="font-size:32px;">${def.e}</div>
        <div class="ui-info">
          <div class="ui-name">${def.lvnames[lv]}</div>
          <div class="ui-lv">LV${lv+1} [${bar}]</div>
        </div>
      </div>
      <div class="ui-next">
        ${hasNext?`▶ 다음: ${def.lvnames[nextLv]}<br>(수익 ×${(def.lvmult[nextLv]/def.lvmult[lv]).toFixed(1)}배)`:`<span style="color:var(--accent)">✨ 최종 단계 도달!</span>`}
      </div>
      <button class="up-btn" onclick="upObj('${id}')" ${(!canUp||!hasNext)?'disabled':''}>
        ${hasNext?'₩'+fmt(upCost):'MAX'}
      </button>`;
    grid.appendChild(el);
  }
  c.appendChild(grid);
  c.scrollTop=scrollTop;
}
function renderRoomTab(c){
  c.innerHTML='';
  const r=ROOMS[G.stage],nr=ROOMS[G.stage+1];
  const cur=document.createElement('div');cur.className='rc';
  cur.innerHTML=`<div style="font-size:26px;margin-bottom:6px">${r.emoji}</div>
<h3>${G.stage+1}단계: ${r.name}</h3>
<div class="ri">슬롯: ${r.slots===Infinity?'∞ (무한)':r.slots}개</div>
<div class="rdesc">${r.desc}</div>`;
  c.appendChild(cur);
  if(!nr){
    const m=document.createElement('div');m.className='rc';
    m.innerHTML=`<div style="font-size:8px;color:var(--accent);line-height:2">🌀 차원 너머 방 달성<br>숫자들이 말을 걸어옵니다.</div>`;
    c.appendChild(m);
    return;
  }
  const canUp=G.money>=nr.cost;
  const upCard=document.createElement('div');upCard.className='rc';
  upCard.innerHTML=`<div style="font-size:22px;margin-bottom:6px">${nr.emoji}</div>
<h3>다음 단계</h3>
<div class="ri">${G.stage+2}단계: ${nr.name} (슬롯 ${nr.slots===Infinity?'∞':nr.slots}개)</div>
<div style="font-size:7px;color:var(--green);margin:6px 0">💰 ₩${fmt(nr.cost)}</div>
<div style="font-size:5px;color:#4a5568;margin-bottom:10px">보유: ₩${fmt(G.money)} / 필요: ₩${fmt(nr.cost)}</div>
<button class="rub" onclick="upgradeRoom()" ${!canUp?'disabled':''}>${canUp?'🏠 업그레이드!':'₩'+fmt(nr.cost-G.money)+' 더 필요'}</button>`;
  c.appendChild(upCard);
  // Reset button at bottom
  const reset=document.createElement('div');reset.style.cssText='text-align:center;margin-top:16px;';
  reset.innerHTML=`<button onclick="resetGame()" style="background:none;border:1px solid #333;color:#444;font-family:inherit;font-size:5px;padding:5px 10px;cursor:pointer;border-radius:2px">초기화</button>`;
  c.appendChild(reset);
}

// ═══════════════════════════════
// CLICK
// ═══════════════════════════════
function calcClickVal(){
  return Math.max(1, ps * 0.5) * CLICK_MULTS[G.clickLv];
}
function clickChar(){
  const v=calcClickVal();
  G.money+=v; G.totalEarned+=v; G.totalClicks=(G.totalClicks||0)+1;
  // hint 숨기기
  if(G.totalClicks===1){const h=document.getElementById('click-hint');if(h)h.style.display='none';}
  // 팝업 텍스트
  const room=document.getElementById('room');
  const p=document.createElement('div');
  p.className='click-pop';
  p.textContent='+₩'+fmt(v);
  p.style.left='50%'; p.style.top='32%';
  room.appendChild(p);
  setTimeout(()=>p.remove(),900);
}
function upClick(){
  const nextLv=G.clickLv+1;
  if(nextLv>=CLICK_COSTS.length)return;
  const cost=CLICK_COSTS[nextLv];
  if(G.money<cost){showToast('돈이 부족합니다!');return;}
  G.money-=cost; G.clickLv=nextLv;
  showToast('👆 '+CLICK_NAMES[G.clickLv]+' 업그레이드!');
  renderTab();
}

// ═══════════════════════════════
// ACTIONS
// ═══════════════════════════════
function buyObj(id){
  const def=OBJS.find(x=>x.id===id);if(!def)return;
  if(G.money<def.cost){showToast('돈이 부족합니다!');return;}
  if(availSlots()<=0){showToast('슬롯이 가득 찼습니다!');return;}
  if(G.stage<def.stage){showToast('아직 해금 안 됨!');return;}
  G.money-=def.cost;
  if(!G.objs[id])G.objs[id]={cnt:0,lv:0};
  G.objs[id].cnt++;
  showToast(def.e+' '+def.lvnames[G.objs[id].lv]+' 배치!');
}
function upObj(id){
  const def=OBJS.find(x=>x.id===id);if(!def)return;
  const o=G.objs[id];if(!o||o.cnt===0)return;
  const nextLv=o.lv+1;if(nextLv>=def.lvnames.length)return;
  const cost=def.lvcosts[nextLv];if(G.money<cost){showToast('돈이 부족합니다!');return;}
  G.money-=cost;o.lv=nextLv;
  showToast(def.e+' → '+def.lvnames[nextLv]+' 업그레이드!');
}
function upgradeRoom(){
  const nr=ROOMS[G.stage+1];if(!nr||nr.cost===Infinity)return;
  if(G.money<nr.cost){showToast('돈이 부족합니다!');return;}
  G.money-=nr.cost;G.stage++;
  updateRoomVisual();renderTab();
  document.getElementById('lu-ico').textContent=ROOMS[G.stage].emoji;
  document.getElementById('lu-name').textContent=G.stage+1+'단계: '+ROOMS[G.stage].name;
  document.getElementById('lu-desc').textContent=ROOMS[G.stage].desc;
  document.getElementById('lu-modal').classList.add('show');
}
function resetGame(){
  if(!confirm('처음부터 다시 시작하시겠습니까?'))return;
  localStorage.removeItem('idle_room_v2');location.reload();
}

// ═══════════════════════════════
// EVENTS
// ═══════════════════════════════
function triggerEvent(){
  const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];
  const fx=ev.fx(ps,G.money);
  showEvent({e:ev.e,t:ev.t,d:ev.d,fx:fx.txt,effect:fx});
}
function showEvent({e,t,d,fx,effect}){
  document.getElementById('ev-ico').textContent=e;
  document.getElementById('ev-title').textContent=t;
  document.getElementById('ev-desc').textContent=d;
  document.getElementById('ev-fx').textContent=fx||'';
  pendingEffect=effect||null;
  document.getElementById('ev-modal').classList.add('show');
}
function closeEvent(){
  document.getElementById('ev-modal').classList.remove('show');
  if(pendingEffect){
    if(pendingEffect.type==='money'){G.money+=pendingEffect.v;if(G.money<0)G.money=0;}
    else if(pendingEffect.type==='buff'){G.buff={mult:pendingEffect.mult,end:Date.now()+pendingEffect.dur*1000};}
    pendingEffect=null;
  }
  renderTab();
}

// ═══════════════════════════════
// TOAST
// ═══════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(showToast._t);showToast._t=setTimeout(()=>t.classList.remove('show'),1800);
}

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
load();
updateRoomVisual();
renderTab();
updateHUD();
// 이미 클릭한 적 있으면 힌트 숨기기
if((G.totalClicks||0)>0){const h=document.getElementById('click-hint');if(h)h.style.display='none';}
setInterval(tick,100);
setInterval(()=>{if(G.stage>=8){const sc=document.getElementById('star-cv');if(sc)drawStars(sc);}},8000);
window.addEventListener('resize',()=>{const sc=document.getElementById('star-cv');if(sc)drawStars(sc);});
</script>
</body>
